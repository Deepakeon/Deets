name: deets

services:

  app:
    volumes:
      - ./logs:/app/logs
    build:
      context: .
      dockerfile: Dockerfile

    container_name: deets_app

    restart: always

    ports:
      - "8080:8080"

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/urls
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: admin

      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379

    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:15
    container_name: postgres_db
    restart: always

    environment:
      POSTGRES_DB: urls
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      TZ: Asia/Kolkata
      PGTZ: Asia/Kolkata

    ports:
      - "5432:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: redis_cache
    restart: always

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    command: redis-server --save 60 1 --loglevel warning

volumes:
  pgdata:
  redis_data: