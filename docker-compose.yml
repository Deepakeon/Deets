name: deets

services:

  postgres:
    image: postgres:15
    container_name: postgres_db
    restart: always

    environment:
      POSTGRES_DB: urls
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      TZ: Asia/Kolkata
      PGTZ: Asia/Kolkata

    ports:
      - "5432:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: redis_cache
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning

volumes:
  pgdata:
  redis_data: